<!DOCTYPE html>
<html>

<head>
  <title>AutoFill Resume</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="container">
    <!-- Header and Profile Selection -->
    <div class="header" style="flex-direction: column; align-items: flex-start;">
      <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px;">
        <svg class="logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
          <polyline points="10 9 9 9 8 9"></polyline>
        </svg>
        <h2 style="margin: 0;">AutoFill Resumes</h2>
      </div>

      <!-- Profile Selector -->
      <div class="profile-selector" style="width: 100%; display: flex; gap: 8px; align-items: center;">
        <select id="profileSelect" style="flex-grow: 1; padding: 6px; border-radius: 4px; border: 1px solid #d1d5db;">
          <option value="">No Profiles Found - Please Upload</option>
        </select>
        <button id="deleteProfileBtn" class="secondary-btn" title="Delete Profile"
          style="padding: 6px; margin: 0; min-width: auto; height: 31px;" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          </svg>
        </button>
      </div>
    </div>

    <!-- File Upload Section -->
    <div class="upload-section">
      <h3 style="margin-top: 0; margin-bottom: 8px; font-size: 14px;">Create / Replace Profile</h3>
      <label for="resumeInput" class="upload-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="17 8 12 3 7 8"></polyline>
          <line x1="12" y1="3" x2="12" y2="15"></line>
        </svg>
        Upload resume.json
      </label>
      <input type="file" id="resumeInput" accept=".json" class="hidden">

      <label for="resumeFileInput" class="upload-btn" style="margin-top: 8px; background-color: var(--secondary);">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
          <polyline points="10 9 9 9 8 9"></polyline>
        </svg>
        <span id="resumeFileName">Upload PDF/DOCX</span>
      </label>
      <input type="file" id="resumeFileInput" accept=".pdf,.doc,.docx" class="hidden">
    </div>

    <!-- Controls Section -->
    <div class="controls-section">
      <div class="toggle-container">
        <label class="switch">
          <input type="checkbox" id="aiToggle">
          <span class="slider round"></span>
        </label>
        <span class="toggle-label">Enable AI Fallback (Soon)</span>
      </div>
      <button id="fillFormBtn" class="action-btn" disabled>
        Force Fill Form
      </button>
      <button id="viewResumeBtn" class="secondary-btn" disabled>
        View Stored Data
      </button>
    </div>

    <!-- Status Message -->
    <div id="status" class="hidden"></div>

    <!-- Summary Panel Container -->
    <div id="summaryPanelContainer" class="summary-container hidden">
      <h3>Fill Summary</h3>
      <p class="summary-desc">Review and modify the filled values below. Hit "Apply Edits" to push changes to the active
        form.</p>
      <div class="table-scroll">
        <table id="summaryTable">
          <thead>
            <tr>
              <th>Field</th>
              <th>Value</th>
              <th>Status/Conf.</th>
            </tr>
          </thead>
          <tbody id="summaryTableBody">
            <!-- Populated by JS -->
          </tbody>
        </table>
      </div>
      <button id="applyEditsBtn" class="action-btn" style="margin-top: 8px;">Apply Edits</button>
    </div>

    <!-- Resume Preview -->
    <div id="resumePreview" class="hidden">
      <pre id="resumeContent"></pre>
    </div>
  </div>
  <script src="resumeProcessor.js"></script>
  <script src="sidepanel.js"></script>
</body>

</html>
